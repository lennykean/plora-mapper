name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Download CMU dictionary
        run: npm run fetch:cmudict

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  build-windows:
    needs: check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Download CMU dictionary
        run: npm run fetch:cmudict

      - name: Build renderer
        run: npx vite build

      - name: Build Electron main + preload
        run: npx tsx scripts/build-electron.ts

      - name: Package Windows installer
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          npx electron-builder --win --publish never --config.extraMetadata.version="$VERSION"
        shell: bash

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe

  build-macos:
    needs: check
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Download CMU dictionary
        run: npm run fetch:cmudict

      - name: Build renderer
        run: npx vite build

      - name: Build Electron main + preload
        run: npx tsx scripts/build-electron.ts

      - name: Package macOS DMG
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          npx electron-builder --mac --universal --publish never --config.extraMetadata.version="$VERSION"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
