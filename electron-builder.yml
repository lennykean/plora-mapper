appId: com.plora.mapper
productName: PLORA
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - from: data/cmudict.dict
    to: data/cmudict.dict
asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**"
win:
  target: nsis
mac:
  target: dmg
linux:
  target: AppImage
