appId: com.plora.mapper
productName: PLORA
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - from: data/cmudict.dict
    to: data/cmudict.dict
asar: true
asarUnpack:
  - "node_modules/better-sqlite3/**"
win:
  target: nsis
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  identity: null
  category: public.app-category.education
  minimumSystemVersion: "10.15.0"
linux:
  target: AppImage
